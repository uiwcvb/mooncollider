name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
    paths: ['docs/site/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MoonBit
        uses: moonbitlang/moonbit-doc-action@v1
        with:
          moonbit-version: latest
      - name: Build web JS
        run: moon build --target js cmd/web && cp _build/js/debug/build/cmd/web/web.js docs/site/mooncollider.js
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
